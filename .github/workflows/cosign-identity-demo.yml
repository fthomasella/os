name: Cosign Identity Verification Demo
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@main

      - name: Build a test image (NOT a Chainguard image)
        run: |
          echo "This is NOT a Chainguard image" > README
          docker build -t ttl.sh/cosign-demo-${{ github.run_id }}:latest -f - . <<'DOCKERFILE'
          FROM alpine:latest
          COPY README /README
          CMD ["cat", "/README"]
          DOCKERFILE

      - name: Push to ttl.sh (ephemeral registry)
        run: |
          docker push ttl.sh/cosign-demo-${{ github.run_id }}:latest
          echo "IMAGE=ttl.sh/cosign-demo-${{ github.run_id }}:latest" >> $GITHUB_ENV

      - name: Sign keyless with cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ${{ env.IMAGE }}
          echo "::notice::Image signed keyless by GitHub Actions workflow (not Chainguard)"

      - name: Wait for transparency log
        run: sleep 15

      - name: "PROOF 1: cosign verify WITHOUT identity pin (PASSES — proves default verify accepts non-Chainguard)"
        run: |
          echo "=== cosign verify (no identity pin) ==="
          cosign verify --yes ${{ env.IMAGE }} 2>&1 || echo "FAILED (unexpected)"
          echo ""
          echo "::warning::cosign verify PASSED for a non-Chainguard image — default verification does NOT check signer identity"

      - name: "PROOF 2: cosign verify WITH Chainguard identity pin (FAILS — proves this is NOT signed by Chainguard)"
        run: |
          echo "=== cosign verify --certificate-identity=github.com/chainguard-images/images/.github/workflows/release.yaml@refs/heads/main ==="
          cosign verify --yes \
            --certificate-identity="github.com/chainguard-images/images/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.IMAGE }} 2>&1 && echo "UNEXPECTED: verify passed" || echo "EXPECTED: verification fails — this image was NOT signed by Chainguard's release workflow"
          echo ""
          echo "::notice::cosign verify with Chainguard identity pin FAILED — proves the image is NOT from Chainguard"

      - name: Show certificate details (proves signer is our workflow, not Chainguard)
        run: |
          echo "=== Certificate subject (the signer identity) ==="
          cosign verify --yes --output-certificate=/tmp/cert.pem ${{ env.IMAGE }} 2>/dev/null || true
          openssl x509 -in /tmp/cert.pem -text -noout 2>/dev/null | grep -E "Subject:|Issuer:|URI:" | head -10 || echo "cert extraction failed"
