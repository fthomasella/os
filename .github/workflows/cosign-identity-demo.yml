name: Cosign Identity Verification Demo
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@main

      - name: Build a test image (NOT a Chainguard image)
        run: |
          echo "This is NOT a Chainguard image" > README
          docker build -t ttl.sh/cosign-demo-${{ github.run_id }}:latest -f - . <<'DOCKERFILE'
          FROM alpine:latest
          COPY README /README
          CMD ["cat", "/README"]
          DOCKERFILE

      - name: Push to ttl.sh (ephemeral registry)
        run: docker push ttl.sh/cosign-demo-${{ github.run_id }}:latest

      - name: Sign keyless with cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ttl.sh/cosign-demo-${{ github.run_id }}:latest
          echo "::notice::Image signed keyless by GitHub Actions workflow (not Chainguard)"

      - name: Wait for transparency log
        run: sleep 15

      - name: "PROOF 1: cosign verify WITHOUT identity pin"
        run: |
          echo "=== cosign verify (no identity pin) ==="
          set +e
          cosign verify ttl.sh/cosign-demo-${{ github.run_id }}:latest 2>&1
          EXIT_CODE=$?
          set -e
          echo "Exit code: $EXIT_CODE"
          if [ $EXIT_CODE -eq 0 ]; then
            echo "::warning::cosign verify PASSED for a non-Chainguard image — default verification does NOT check signer identity"
          else
            echo "::notice::cosign verify failed (exit $EXIT_CODE) — may need tlog delay"
          fi

      - name: "PROOF 2: cosign verify WITH Chainguard identity pin"
        run: |
          echo "=== cosign verify --certificate-identity=github.com/chainguard-images/images/.github/workflows/release.yaml@refs/heads/main ==="
          set +e
          cosign verify \
            --certificate-identity="github.com/chainguard-images/images/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ttl.sh/cosign-demo-${{ github.run_id }}:latest 2>&1
          EXIT_CODE=$?
          set -e
          echo "Exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::notice::cosign verify with Chainguard identity pin FAILED (exit $EXIT_CODE) — proves the image is NOT from Chainguard"
          else
            echo "::error::UNEXPECTED: verify passed with Chainguard identity — should have failed"
          fi

      - name: Show certificate details
        run: |
          echo "=== Certificate (the signer identity) ==="
          set +e
          cosign verify --output-certificate=/tmp/cert.pem ttl.sh/cosign-demo-${{ github.run_id }}:latest 2>/dev/null
          openssl x509 -in /tmp/cert.pem -text -noout 2>/dev/null | grep -E "Subject:|Issuer:|URI:" | head -10 || echo "cert extraction failed"
          set -e
